events {}

http {
    # DNS interno do Docker. valid=10s: o nginx re-resolve o nome a cada 10s,
    # então quando uma réplica é recriada (IP novo) ele a encontra sozinho —
    # sem reload e sem ficar preso no IP antigo (502 permanente).
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        location / {
            # As duas réplicas compartilham o alias de rede "app" (ver
            # docker-compose.yml). O DNS do Docker devolve os IPs das réplicas
            # vivas sob esse nome; usar o nome via variável força o nginx a
            # resolver em runtime (e não só no startup, como faz o bloco upstream).
            set $backend "app:3000";
            proxy_pass http://$backend;

            # Resiliência durante o rolling deploy: se a réplica que está sendo
            # recriada recusar/estourar a conexão, tenta a próxima viva.
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout 2s;

            # Repassa a origem real da requisição para o backend.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
